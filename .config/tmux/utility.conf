bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons --hide-duplicates| fzf-tmux -p 100%,100% --reverse \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:70%' \
    --preview 'sesh preview {}' \
)\""
bind -N "⌘+g lazygit " g new-window -c "#{pane_current_path}" -n "🌳 LazyGit" "lazygit 2> /dev/null"
bind -N "⌘+⇧+G gh-dash " z new-window -c "#{pane_current_path}" -n "😺 GHDash" "gh dash 2> /dev/null"
bind -N "⌘+⇧+M lazysql " m new-window -c "#{pane_current_path}" -n "🗄️ LazySql" "lazysql 2> /dev/null"
bind -N "⌘+l last-session (via sesh) " L run-shell "sesh last || tmux display-message -d 1000 'Oops, no last sessions found'"
bind -N "⌘+e editor" e new-window -S -n '📝' 'nvim +GoToFile'
bind -N "⌘+E editor" E new-window -S -n '📝' 'nvim +CodeDiff'
bind -N "⌘+z opencode" Z new-window -c "#{pane_current_path}" -n "🤖 Opencode" "opencode"
bind -N "⌘+A copilot" A new-window -c "#{pane_current_path}" -n "🤖 Copilot" "copilot"
bind -N "⌘+a claude" a new-window -c "#{pane_current_path}" -n "💬 Claude" "claude"
bind '%' split-window -c '#{pane_current_path}' -h
bind '"' split-window -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}' 
bind b set -g status

