# =============================================================================
# Kitty Configuration
# Ported from Wezterm config
# =============================================================================

# ----- Font -----
# Font: bold weight'i zorla kullan, regular yerine
# font_family      JetBrainsMono NFM SemiBold
# bold_font        JetBrainsMono NFM Bold
# italic_font      JetBrainsMono NFM Italic
# bold_italic_font JetBrainsMono NFM Bold Italic
# Font: bold weight'i zorla kullan, regular yerine
font_family      Maple Mono NF SemiBold
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono NF Bold Italic
font_size        17

# Kitty'nin macOS'ta zayıf render etmesini düzelt
text_composition_strategy 1.7 30
macos_thicken_font        0.4

# Eğer hâlâ ince görünüyorsa thicken'ı arttır:
# macos_thicken_font 0.6

# ----- Cursor -----
# cursor                  #C8C093
# cursor_text_color       #1F1F28
cursor_shape            block
cursor_blink_interval   0

# ----- Scrollback -----
scrollback_lines 10000

# ----- Window -----
window_padding_width    0
window_margin_width     0
placement_strategy      center
hide_window_decorations yes
confirm_os_window_close 0

# ---- Background ----
background_image ~/.config/kitty/wallpapers/wallpaper.jpg
background_image_layout cscaled
background_image_linear no
background_tint 0.92
background_tint_gaps 1.0
background_opacity 1.0

# ----- Tab Bar -----
# Tab bar disabled (matching wezterm enable_tab_bar = false)
tab_bar_style           hidden

# ----- Bell -----
enable_audio_bell no

# ----- URL -----
# url_color               #72A7BC
url_style               single
detect_urls             yes

# ----- Advanced -----
allow_remote_control    yes
listen_on               unix:/tmp/kitty
shell_integration       enabled

# =============================================================================
# Kanagawa Color Scheme (Wave)
# Ported from Kanagawa (Gogh) - matching wezterm color_scheme
