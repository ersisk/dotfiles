# =============================================================================
# Key Mappings
# Tmux prefix: Ctrl+A (matching wezterm cmd_to_tmux_prefix)
# kitty uses ctrl+ instead of cmd+ (Linux/cross-platform compat)
# =============================================================================

# Clear default shortcuts
clear_all_shortcuts no

# -- Tmux window switching (Cmd+1..9 -> Ctrl+A, 1..9) --
map cmd+1 send_text all \x01\x31
map cmd+2 send_text all \x01\x32
map cmd+3 send_text all \x01\x33
map cmd+4 send_text all \x01\x34
map cmd+5 send_text all \x01\x35
map cmd+6 send_text all \x01\x36
map cmd+7 send_text all \x01\x37
map cmd+8 send_text all \x01\x38
map cmd+9 send_text all \x01\x39

# -- Tmux session/window management --
# Detach Session (Cmd+D -> Ctrl+A, Shift+D)
map cmd+d send_text all \x01D
# Vertical Split (Cmd+N -> Ctrl+A, %)
map cmd+n send_text all \x01%
map cmd+é send_text all \x01%
# Horizontal Split (Cmd+" -> Ctrl+A, ")
map cmd+shift+' send_text all \x01"
map cmd+" send_text all \x01"
# Sesh (Cmd+K -> Ctrl+A, Shift+T)
map cmd+k send_text all \x01T
# Last Session (Cmd+L -> Ctrl+A, Shift+L)
map cmd+l send_text all \x01L
# New Window (Cmd+T -> Ctrl+A, c)
map cmd+t send_text all \x01c
# Toggle Tmux Status (Cmd+Shift+B -> Ctrl+A, b)
map cmd+shift+b send_text all \x01b
# Copy Mode (Cmd+Shift+C -> Ctrl+A, [)
map cmd+shift+c send_text all \x01[
# Rename Window (Cmd+ğ -> Ctrl+A, ,)
# Note: ğ may need adjustment depending on keyboard layout
map cmd+ğ send_text all \x01,
# Rename Session (Cmd+Shift+R -> Ctrl+A, $)
map cmd+shift+r send_text all \x01$
# Close Window (Cmd+W -> Ctrl+A, &)
map cmd+w send_text all \x01&
# Close Pane (Cmd+Shift+W -> Ctrl+A, x)
map cmd+shift+w send_text all \x01x

# -- Tools --
# LazyGit (Cmd+G -> Ctrl+A, g)
map cmd+g send_text all \x01g
# LazySql (Cmd+Shift+M -> Ctrl+A, m)
map cmd+shift+m send_text all \x01m
# OpenURL (Cmd+O -> Ctrl+A, u)
map cmd+o send_text all \x01u
# Open Editor (Cmd+E -> Ctrl+A, e)
map cmd+e send_text all \x01e
# Editor Diff (Cmd+Shift+E -> Ctrl+A, Shift+E)
map cmd+shift+e send_text all \x01E

# -- Navigate Panes --
# Previous Pane (Cmd+Left -> Ctrl+A, p)
map cmd+left send_text all \x01p
# Next Pane (Cmd+Right -> Ctrl+A, n)
map cmd+right send_text all \x01n

# -- AI Tools --
# Claude (Cmd+A -> Ctrl+A, a)
map cmd+a send_text all \x01a
# Opencode (Cmd+Shift+A -> Ctrl+A, Shift+A)
map cmd+shift+a send_text all \x01A
# Generate Commit (Cmd+Shift+Z -> Ctrl+A, Shift+Z)
map cmd+shift+z send_text all \x01Z
# GH Dash (Cmd+Shift+G -> Ctrl+A, z)
map cmd+shift+g send_text all \x01z

# -- Editor Shortcuts (Neovim) --
# GoToFile (Cmd+P -> Esc, :GoToFile + Enter)
map cmd+p send_text all \x1b:GoToFile\r
# GoToSymbol (Cmd+Shift+P -> Esc, :GoToSymbol + Enter)
map cmd+shift+p send_text all \x1b:GoToSymbol\r
# GoToBuffer (Cmd+Shift+T -> Esc, :GoToBuffer + Enter)
map cmd+shift+t send_text all \x1b:GoToBuffer\r

# Save file (Cmd+S -> Esc, :w + Enter)
map cmd+s send_text all \x1b:w\r

# -- Standard kitty shortcuts (keep useful defaults) --
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0
map cmd+q quit


# BEGIN_KITTY_THEME
# Kanagawa
include current-theme.conf
# END_KITTY_THEME
